services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: myionio-backend
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-MyIonio}
      - Jwt__Audience=${JWT_AUDIENCE:-MyIonioUsers}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - AllowedOrigins=${FRONTEND_URL:-http://localhost}
    networks:
      - myionio-network
    ports:
      - "5000:80"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.myionio.site/api}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: myionio-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - myionio-network
    ports:
      - "8080:80"

networks:
  myionio-network:
    driver: bridge

