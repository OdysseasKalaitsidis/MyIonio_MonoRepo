services:
  # ─── Kafka (KRaft mode — no Zookeeper required) ──────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: myionio-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      # KRaft settings — Kafka manages its own metadata without Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - myionio-network

  backend:
    image: ghcr.io/odysseaskalaitsidis/myionio-backend:latest
    container_name: myionio-backend
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-MyIonio}
      - Jwt__Audience=${JWT_AUDIENCE:-MyIonioUsers}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - AllowedOrigins=${FRONTEND_URL:-https://myionio.site}
      - Kafka__BootstrapServers=kafka:9092
    networks:
      - myionio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5000:80"

  frontend:
    image: ghcr.io/odysseaskalaitsidis/myionio-frontend:latest
    container_name: myionio-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - myionio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8080:80"

  ai-service:
    image: ghcr.io/odysseaskalaitsidis/myionio-ai:latest
    container_name: myionio-ai
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKEND_URL=http://backend:5000
    networks:
      - myionio-network
    ports:
      - "8000:8000"

networks:
  myionio-network:
    driver: bridge
