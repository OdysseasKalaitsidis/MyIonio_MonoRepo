services:
  db:
    image: postgres:15
    container_name: myionio-db
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - myionio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (KRaft mode — no Zookeeper required) ──────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: myionio-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      # KRaft settings — Kafka manages its own metadata without Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - myionio-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: ghcr.io/odysseaskalaitsidis/myionio-backend:latest
    container_name: myionio-backend
    restart: always
    depends_on:
      kafka:
        condition: service_started
      db:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-MyIonio}
      - Jwt__Audience=${JWT_AUDIENCE:-MyIonioUsers}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - AllowedOrigins=${FRONTEND_URL:-https://myionio.site}
      - Kafka__BootstrapServers=kafka:9092
    networks:
      - myionio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5000:80"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: ghcr.io/odysseaskalaitsidis/myionio-frontend:latest
    container_name: myionio-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - myionio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8080:80"

  ai-service:
    build:
      context: ./MyIonio-AI
      dockerfile: Dockerfile
    image: ghcr.io/odysseaskalaitsidis/myionio-ai:latest
    container_name: myionio-ai
    restart: always
    depends_on:
      kafka:
        condition: service_started
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKEND_URL=http://backend:5000
    networks:
      - myionio-network
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: myionio-prometheus
    restart: always
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - myionio-network

  grafana:
    image: grafana/grafana:latest
    container_name: myionio-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - myionio-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: myionio-alertmanager
    restart: always
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - myionio-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: myionio-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    networks:
      - myionio-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: myionio-cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - myionio-network

networks:
  myionio-network:
    driver: bridge
