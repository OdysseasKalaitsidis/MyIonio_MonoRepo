apiVersion: apps/v1
kind: Deployment
metadata:
  name: myionio-db
  namespace: myionio-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myionio-db
  template:
    metadata:
      labels:
        app: myionio-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "myioniodb"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "password123" # In production, use a Secret
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-storage
        emptyDir: {} # For a real prod cluster, use a PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: myionio-db-service
  namespace: myionio-prod
spec:
  selector:
    app: myionio-db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
