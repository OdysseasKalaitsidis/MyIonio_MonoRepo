groups:
- name: myionio_alerts
  rules:
  - alert: HighErrorRate
    expr: |
      sum(rate(http_requests_received_total{code=~"5.."}[5m])) 
      / 
      sum(rate(http_requests_received_total[5m])) > 0.05
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High Error Rate on MyIonio Backend"
      description: "The error rate is above 5% for the last 5 minutes (current value: {{ $value }})."

  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: page
    annotations:
      summary: "Instance {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."
