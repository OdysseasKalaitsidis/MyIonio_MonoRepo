# Configuration for myionio.site (Frontend)
server {
    server_name myionio.site;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSL Configuration (Already existing in your VM)
    # listen 443 ssl; 
    # ...
}

# Configuration for api.myionio.site (Backend)
server {
    server_name api.myionio.site;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSL Configuration (Already existing in your VM)
    # listen 443 ssl; 
    # ...
}
